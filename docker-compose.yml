services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: school-sql-server
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql  
    networks:
      - school-network

  students-mvc:
    image: students-mvc-app
    container_name: students-mvc-container
    build:
      context: ./SchoolPortal.StudentApp  
      dockerfile: Dockerfile
    ports:
      - "5001:8080"  
    environment:
      - ConnectionStrings__DefaultConnection=Server=${DB_SERVER};Database=StudentsDb;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;
    depends_on:
      - sqlserver
    networks:
      - school-network

  grades-mvc:
    image: grades-mvc-app
    container_name: grades-mvc-container
    build:
      context: ./SchoolPortal.GradesApp 
      dockerfile: Dockerfile
    ports:
      - "5002:8080" 
    environment:
      - ConnectionStrings__DefaultConnection=Server=${DB_SERVER};Database=GradesDb;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;
      - ExternalServices__StudentsServiceUrl=http://students-mvc:8080
    depends_on:
      - sqlserver
    networks:
      - school-network

networks:
  school-network:
    driver: bridge

volumes:
  mssql-data:
    driver: local